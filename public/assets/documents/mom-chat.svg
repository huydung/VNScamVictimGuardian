    <text x="88" y="220" font-family="Arial, sans-serif" font-size="34" fill="#263234">Hỏi thăm sức khoẻ</text><text x="88" y="294" font-family="Arial, sans-serif" font-size="34" fill="#263234">Nhắc chuyện gia đình</text><text x="88" y="368" font-family="Arial, sans-serif" font-size="34" fill="#263234">Dặn không kể con</text><text x="88" y="442" font-family="Arial, sans-serif" font-size="34" fill="#263234">Hẹn giờ chuyển tiền</text>
